<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About - VITAL</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="logo">VITAL</div>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/about.html" class="active">About</a></li>
        <li><a href="/team.html">Team</a></li>
        <li><a href="/survey.html">Survey</a></li>
        <li><a href="/resources.html">Resources</a></li>
        <li><a href="/apply.html">Apply</a></li>
        <li><a href="/admin">Admin</a></li>
      </ul>
    </div>
  </nav>

  <section class="page-header">
    <h1>Who Are We?</h1>
  </section>

  <section class="about-section">
    <div class="container">
      <div class="about-content" id="aboutContent">
        <p class="loading">Loading about information...</p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2025 VITAL Student Organization. All rights reserved.</p>
  </footer>

  <script src="app.js"></script>
  <script>
    loadAbout();
    
    async function loadAbout() {
      try {
        const response = await fetch('/api/data');
        const data = await response.json();
        const aboutContent = document.getElementById('aboutContent');
        
        if (data.about.content) {
          aboutContent.innerHTML = `
            ${data.about.image ? `<img src="/uploads/${data.about.image}" alt="About" class="about-image">` : ''}
            <div class="about-text">
              <h2>${data.about.title}</h2>
              <p>${data.about.content}</p>
            </div>
          `;
        } else {
          aboutContent.innerHTML = '<p>Coming soon...</p>';
        }
      } catch (error) {
        console.error('Error loading about:', error);
      }
    }
  </script>
</body>
</html>
