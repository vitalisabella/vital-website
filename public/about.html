<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About - VITAL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">VITAL</a>
      <ul class="nav-menu">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="/about.html" class="nav-link active">About</a></li>
        <li><a href="/team.html" class="nav-link">Team</a></li>
        <li><a href="/schedule.html" class="nav-link">Schedule</a></li>
        <li><a href="/survey.html" class="nav-link">Survey</a></li>
        <li><a href="/resources.html" class="nav-link">Resources</a></li>
        <li><a href="/apply.html" class="nav-link">Apply</a></li>
        <li><a href="/admin.html" class="nav-link admin-link">Admin</a></li>
      </ul>
    </div>
  </nav>

  <section class="page-header">
    <h1>About VITAL</h1>
    <p>Learn about our mission and vision</p>
  </section>

  <section class="form-section">
    <div class="container">
      <div class="form-wrapper">
        <div id="about-display" class="info-box">
          <h2 id="about-title">Who Are We?</h2>
          <p id="about-content" style="margin-top: 1rem; line-height: 1.8;">Loading information...</p>
          <div id="about-image-container" style="margin-top: 2rem;"></div>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2025 VITAL Student Organization. All rights reserved.</p>
  </footer>

  <script>
    async function loadAbout() {
      try {
        const res = await fetch('/api/data');
        const data = await res.json();
        
        document.getElementById('about-title').textContent = data.about.title || 'Who Are We?';
        document.getElementById('about-content').textContent = data.about.content || 'Information coming soon. Ask an admin to add content.';
        
        if (data.about.image) {
          document.getElementById('about-image-container').innerHTML = `<img src="/uploads/${data.about.image}" style="width: 100%; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">`;
        }
      } catch (error) {
        console.error('Error loading about:', error);
      }
    }
    
    loadAbout();
  </script>
</body>
</html>
