<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - VITAL</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">
  <div class="admin-container">
    <nav class="admin-sidebar">
      <div class="admin-logo">VITAL Admin</div>
      <ul class="admin-menu">
        <li><a href="#" data-section="login" class="menu-item active">Login</a></li>
      </ul>
    </nav>

    <main class="admin-main">
      <div id="loginSection" class="admin-section active">
        <h2>Admin Login</h2>
        <form id="loginForm">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
          </div>
          <button type="submit" class="btn">Login</button>
        </form>
      </div>

      <div id="dashboardSection" class="admin-section" style="display: none;">
        <div class="admin-header">
          <h2>Admin Dashboard</h2>
          <button id="logoutBtn" class="btn btn-secondary">Logout</button>
        </div>

        <div class="admin-tabs">
          <button class="tab-btn active" data-tab="announcements">Announcements</button>
          <button class="tab-btn" data-tab="team">Team Members</button>
          <button class="tab-btn" data-tab="about">About</button>
          <button class="tab-btn" data-tab="resources">Resources</button>
          <button class="tab-btn" data-tab="applications">Applications</button>
          <button class="tab-btn" data-tab="surveys">Surveys</button>
        </div>

        <!-- Announcements Tab -->
        <div id="announcementsTab" class="tab-content active">
          <h3>Manage Announcements</h3>
          <form id="announcementForm">
            <div class="form-group">
              <label>Title</label>
              <input type="text" id="announcementTitle" required>
            </div>
            <div class="form-group">
              <label>Content</label>
              <textarea id="announcementContent" rows="4" required></textarea>
            </div>
            <div class="form-group">
              <label>Thumbnail Image</label>
              <input type="file" id="announcementImage" accept="image/*">
            </div>
            <button type="submit" class="btn">Add Announcement</button>
          </form>
          <div id="announcementsList"></div>
        </div>

        <!-- Team Tab -->
        <div id="teamTab" class="tab-content">
          <h3>Manage Team Members</h3>
          <form id="teamForm">
            <div class="form-group">
              <label>Name</label>
              <input type="text" id="teamName" required>
            </div>
            <div class="form-group">
              <label>Role</label>
              <input type="text" id="teamRole" placeholder="e.g., Team Leader, Mentor" required>
            </div>
            <div class="form-group">
              <label>Bio</label>
              <textarea id="teamBio" rows="3"></textarea>
            </div>
            <div class="form-group">
              <label>Photo</label>
              <input type="file" id="teamPhoto" accept="image/*">
            </div>
            <button type="submit" class="btn">Add Team Member</button>
          </form>
          <div id="teamList"></div>
        </div>

        <!-- About Tab -->
        <div id="aboutTab" class="tab-content">
          <h3>Edit About Section</h3>
          <form id="aboutForm">
            <div class="form-group">
              <label>Title</label>
              <input type="text" id="aboutTitle" value="Who Are We?">
            </div>
            <div class="form-group">
              <label>Content</label>
              <textarea id="aboutContent" rows="6" required></textarea>
            </div>
            <div class="form-group">
              <label>Featured Image</label>
              <input type="file" id="aboutImage" accept="image/*">
            </div>
            <button type="submit" class="btn">Save About Section</button>
          </form>
        </div>

        <!-- Resources Tab -->
        <div id="resourcesTab" class="tab-content">
          <h3>Manage Resources</h3>
          <form id="resourceForm">
            <div class="form-group">
              <label>Title</label>
              <input type="text" id="resourceTitle" required>
            </div>
            <div class="form-group">
              <label>Category</label>
              <input type="text" id="resourceCategory" placeholder="e.g., Mentoring, Leadership" required>
            </div>
            <div class="form-group">
              <label>Link</label>
              <input type="url" id="resourceLink" required>
            </div>
            <button type="submit" class="btn">Add Resource</button>
          </form>
          <div id="resourcesList"></div>
        </div>

        <!-- Applications Tab -->
        <div id="applicationsTab" class="tab-content">
          <h3>Team Leader Applications</h3>
          <div id="applicationsList"></div>
        </div>

        <!-- Surveys Tab -->
        <div id="surveysTab" class="tab-content">
          <h3>Student Survey Responses</h3>
          <div id="surveysList"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
